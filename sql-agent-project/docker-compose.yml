services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: business_sandbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # This maps a local init script to run automatically when the DB starts
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: